<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable - Marché 241</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent-color: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            padding: 24px;
        }

        .glow-background {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary-glow) 0%, rgba(3, 7, 18, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            animation: pulse-glow 8s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { width: 450px; height: 450px; opacity: 0.8; }
            100% { width: 600px; height: 600px; opacity: 1.2; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            position: relative;
            animation: fade-in 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--accent-color);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .icon-svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .error-code {
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -4px;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #6366f1, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        p {
            font-size: 15px;
            font-weight: 400;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .url-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
            margin-bottom: 32px;
            word-break: break-all;
            max-width: 100%;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            width: 100%;
            margin-bottom: 24px;
        }

        .footer-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>
    <div class="glow-background"></div>

    <div class="card">
        <div class="icon-container">
            <svg class="icon-svg" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                <line x1="11" y1="8" x2="11" y2="11"></line>
                <line x1="11" y1="14" x2="11.01" y2="14"></line>
            </svg>
        </div>

        <div class="error-code">404</div>
        <h1>Page introuvable</h1>
        <p>Cette route n'existe pas sur l'API Marché 241.</p>

        <div id="url-display" class="url-badge"></div>

        <div class="divider"></div>

        <div class="footer-text">Marché 241 API</div>
    </div>

    <script>
        document.getElementById('url-display').textContent = window.location.pathname;
    </script>
</body>
</html>
